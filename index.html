          { id: 'inv55', title: 'Bioprinting Cardíaco Vascularizado', country: 'Estados Unidos 🇺🇸', institution: 'MIT IMES / Wake Forest', axis: 'Robótica & Medicina Regenerativa', trl: 2, desc: 'Impressão 3D de órgãos inteiros operacionais contendo toda a micro-rede de veias e artérias conectadas.', impact: 'Testes de oxigenação celular em andamento.', source: 'MIT', image: axisImages['Robótica & Medicina Regenerativa'] },

        // --- 2. COMPONENTES AUXILIARES ---

        const SectionHeader = ({ title, subtitle, icon }) => (

                    <div 
                      className={`relative rounded-full shadow-lg border-2 border-white transition-all flex items-center justify-center font-black text-white drop-shadow-md
                        ${pt.color} ${selectedId === pt.id ? 'scale-125 ring-4 ring-blue-300 ring-opacity-50 z-30' : 'opacity-90 hover:opacity-100 hover:scale-110'}`}
                      style={{ width: pt.size, height: pt.size }}

                    {(hovered?.id === pt.id || selectedId === pt.id) && (
                      <span className="absolute top-full mt-2 bg-slate-900 text-white text-[10px] uppercase font-black px-3 py-1 rounded-full shadow-lg z-30 border border-white/20 whitespace-nowrap">{String(pt.name)}</span>
                    )}
                  </div>
                ))}
              </div>
            </div>
          );
        };

        const RadarTab = () => {
          const [selectedCountry, setSelectedCountry] = useState('Todos');
          const [selectedAxis, setSelectedAxis] = useState('Todos');
          const [selectedTrl, setSelectedTrl] = useState('Todos');
          const [hoveredDot, setHoveredDot] = useState(null);
          const [selectedCard, setSelectedCard] = useState(null);

          const filteredData = innovationsData.filter(item => {
            if (selectedCountry !== 'Todos' && item.country !== selectedCountry) return false;
            if (selectedAxis !== 'Todos' && item.axis !== selectedAxis) return false;
            if (selectedTrl === 'Ideação & Pesquisa (TRL 1-3)' && (item.trl > 3)) return false;
            if (selectedTrl === 'Validação & Piloto (TRL 4-6)' && (item.trl < 4 || item.trl > 6)) return false;
            if (selectedTrl === 'Operacional & Mercado (TRL 7-9)' && (item.trl < 7)) return false;
            return true;
          });

          const countries = ['Todos', ...new Set(innovationsData.map(d => d.country))];
          const trlFilters = ['Todos', 'Ideação & Pesquisa (TRL 1-3)', 'Validação & Piloto (TRL 4-6)', 'Operacional & Mercado (TRL 7-9)'];

          const getLabelPos = (angleDeg, radius) => {
            const angleRad = angleDeg * (Math.PI / 180);
            return {
              x: Math.cos(angleRad) * radius,
              y: Math.sin(angleRad) * radius
            };
          };

          return (
            <div className="flex flex-col h-full gap-4 pb-12 w-full">
              <SectionHeader title="Matriz de Inovação TRL" subtitle="Tecnologias Deep-Tech validadas em Saúde." icon="fa-solid fa-bullseye" />
              <DidacticIntro 
                title="Deixando uma Marca no Universo" 
                text="É aqui que deixamos a nossa marca no universo. Nós não queríamos apenas uma lista de ideias; nós queríamos precisão cirúrgica. Por isso, garimpamos registros diretos da FDA, EMA e ANVISA, além das descobertas mais recentes nas revistas Nature e Science. Mapeamos 55 tecnologias auditadas em ClinicalTrials que pareciam ficção científica há uma década e as colocamos em um único radar. Da ideia genial no papel (TRL 1) ao impacto real na vida das pessoas (TRL 9). Navegue e descubra o que as mentes mais brilhantes do planeta estão entregando hoje." 
                source="FDA, EMA, ANVISA, Nature, Science, ClinicalTrials"
              />

              {/* Filtros Inteligentes */}
              <div className="flex flex-wrap lg:flex-nowrap gap-4 bg-slate-50 p-5 rounded-[24px] border-2 border-slate-100 shadow-sm shrink-0 mb-4 items-center">
                 <div className="flex items-center gap-3 shrink-0 mr-2"><i className="fa-solid fa-filter text-xl text-blue-600"></i><label className="font-black text-slate-800 text-sm uppercase tracking-tighter hidden md:block">Filtros:</label></div>
                 <select value={selectedCountry} onChange={e => {setSelectedCountry(e.target.value); setSelectedCard(null)}} className="flex-1 bg-white border border-slate-200 text-slate-900 text-sm font-black uppercase tracking-tight rounded-xl py-3 px-4 cursor-pointer outline-none focus:border-blue-600 shadow-md">
                   {countries.map(c => <option key={c} value={c}>{c === 'Todos' ? '🌐 Todas as Nações' : String(c)}</option>)}
                 </select>
                 <select value={selectedAxis} onChange={e => {setSelectedAxis(e.target.value); setSelectedCard(null)}} className="flex-1 bg-white border border-slate-200 text-slate-900 text-sm font-black uppercase tracking-tight rounded-xl py-3 px-4 cursor-pointer outline-none focus:border-blue-600 shadow-md">
                   <option value="Todos">🎯 Todos os Eixos</option>
                   {RADAR_AXES.map(a => <option key={a} value={a}>{String(a)}</option>)}
                 </select>
                 <select value={selectedTrl} onChange={e => {setSelectedTrl(e.target.value); setSelectedCard(null)}} className="flex-1 bg-white border border-slate-300 text-slate-700 text-xs font-bold uppercase tracking-tight rounded-xl py-3 px-4 cursor-pointer outline-none focus:border-blue-600 shadow-md">
                   {trlFilters.map(t => <option key={t} value={t}>{t === 'Todos' ? '📈 Toda a Escala TRL' : String(t)}</option>)}
                 </select>
              </div>

              <div className="flex flex-col lg:flex-row gap-8 flex-1 min-h-[500px]">
                {/* Visualização de Gráfico SVG Radar */}
                <div className="lg:w-1/2 bg-slate-900 rounded-[40px] shadow-2xl p-6 relative flex flex-col items-center justify-center overflow-hidden border-[6px] border-slate-800">
                   <svg viewBox="-300 -300 600 600" className="w-full h-full max-h-[500px] drop-shadow-2xl">
                      {/* Círculos Concêntricos - TRL 3, 6, 9 */}
                      <circle r="80" fill="#1e293b" stroke="#334155" strokeWidth="1" strokeDasharray="4 4" />
                      <circle r="160" fill="none" stroke="#334155" strokeWidth="1" strokeDasharray="4 4" />
                      <circle r="240" fill="none" stroke="#475569" strokeWidth="2" />
                      
                      {/* Marcadores de Maturidade */}
                      <text x="5" y="-85" fill="#64748b" fontSize="10" fontWeight="bold">TRL 3</text>
                      <text x="5" y="-165" fill="#64748b" fontSize="10" fontWeight="bold">TRL 6</text>
                      <text x="5" y="-245" fill="#94a3b8" fontSize="10" fontWeight="bold">TRL 9 (Mercado)</text>

                      {/* Eixos Fatiados */}
                      {RADAR_AXES.map((axis, i) => {
                         const angleDeg = i * (360 / RADAR_AXES.length);
                         const lineEnd = getLabelPos(angleDeg, 240);
                         const textPos = getLabelPos(angleDeg + 30, 265); 
                         
                         let textAnchor = "middle";
                         if (textPos.x > 50) textAnchor = "start";
                         else if (textPos.x < -50) textAnchor = "end";

                         return (
                           <g key={`axis-${i}`}>
                             <line x1="0" y1="0" x2={lineEnd.x} y2={lineEnd.y} stroke="#334155" strokeWidth="1.5" />
                             <text x={textPos.x} y={textPos.y} fill={axisColors[axis]} fontSize="9" fontWeight="900" textAnchor={textAnchor} className="uppercase tracking-[0.2em]">{String(axis)}</text>
                           </g>
                         )
                      })}

                      {/* Pontos de Inovação */}
                      {innovationsData.map((item, i) => {
                         const isVisible = filteredData.includes(item);
                         const axisIndex = RADAR_AXES.indexOf(item.axis);
                         const trlRatio = item.trl / 9;
                         
                         // Offset determinístico para separar inovações de mesmo nível e eixo
                         const spreadAngle = 40; 
                         const spreadStep = spreadAngle / 8;
                         const offset = ((i % 9) - 4) * spreadStep;
                         const angleDeg = (axisIndex * (360 / RADAR_AXES.length)) + 30 + offset;
                         
                         const radius = Math.max(20, trlRatio * 240); 
                         const pos = getLabelPos(angleDeg, radius);

                         return (
                           <g key={`dot-${item.id}`} 
                              className={`transition-all duration-700 cursor-pointer ${isVisible ? 'opacity-100 scale-100' : 'opacity-10 scale-50 pointer-events-none'}`}
                              onMouseEnter={() => setHoveredDot(item)}
                              onMouseLeave={() => setHoveredDot(null)}
                              onClick={() => setSelectedCard(item)}
                           >
                              <circle cx={pos.x} cy={pos.y} r={hoveredDot?.id === item.id || selectedCard?.id === item.id ? "14" : "9"} fill={axisColors[item.axis]} stroke="#0f172a" strokeWidth="3" className="drop-shadow-lg" />

                           </g>
                         );

                     </div>

                {/* Lista de Cards Refinada */}

                   {selectedCard ? (
                      <div className="bg-white border-2 border-blue-500 rounded-3xl overflow-hidden shadow-2xl flex flex-col h-full animate-in fade-in zoom-in duration-300 relative">
                        <button onClick={() => setSelectedCard(null)} className="absolute top-3 right-3 bg-white/80 backdrop-blur text-slate-700 hover:text-slate-900 hover:bg-white p-2 rounded-full shadow-md z-20 transition-all">
                          <i className="fa-solid fa-xmark text-xl m-1"></i>
                        </button>
                        <div className="h-48 w-full relative shrink-0 bg-slate-100">
                          <img src={String(selectedCard.image)} className="w-full h-full object-cover" />
                          <div className="absolute inset-0 bg-gradient-to-t from-slate-900/90 to-transparent"></div>
                          <div className="absolute bottom-4 left-6 right-6">
                            <div className="flex gap-2 mb-2">
                               <span className="text-[10px] font-black px-2 py-1 rounded bg-blue-600 text-white shadow-lg uppercase tracking-widest">Nível TRL {String(selectedCard.trl)}</span>
                               <span className="text-[10px] font-black px-2 py-1 rounded bg-white/20 backdrop-blur text-white shadow-lg uppercase tracking-widest truncate">{String(selectedCard.axis)}</span>
                            </div>
                            <h3 className="text-xl font-black text-white leading-tight">{String(selectedCard.title)}</h3>
                          </div>
                        </div>
                        <div className="p-6 flex flex-col flex-1 overflow-y-auto no-scrollbar">
                          <div className="flex items-center gap-2 mb-4 text-xs font-bold text-slate-600 bg-slate-50 p-2 rounded-lg border border-slate-100">
                            <i className="fa-solid fa-location-dot text-blue-500"></i> <span>{String(selectedCard.country)}</span>
                            <span className="text-slate-300">|</span>
                            <i className="fa-solid fa-building text-blue-500"></i> <span className="truncate">{String(selectedCard.institution)}</span>
                          </div>
                          
                          <div className="space-y-4 mb-4">
                            <div>
                              <h5 className="text-[10px] uppercase tracking-widest font-black text-slate-400 mb-2 border-b border-slate-100 pb-1">Conceito Técnico</h5>
                              <p className="text-sm text-slate-700 leading-relaxed font-medium">{String(selectedCard.desc)}</p>
                            </div>
                            {selectedCard.impact && (
                              <div className="bg-blue-50 p-4 rounded-xl border border-blue-100">
                                <h5 className="text-[10px] uppercase tracking-widest font-black text-blue-600 mb-1 flex items-center gap-1.5"><i className="fa-solid fa-bolt text-blue-500"></i> Impacto Prático</h5>
                                <p className="text-xs text-blue-900 font-bold">{String(selectedCard.impact)}</p>
                              </div>
                            )}
                          </div>
                          
                          <div className="mt-auto flex justify-between items-center pt-4 border-t border-slate-100">
                            <SourceTag source={selectedCard.source} />
                          </div>
                        </div>
                      </div>
                   ) : (
                     <div className="flex flex-col gap-3">
                       <div className="bg-blue-50 border border-blue-100 p-3 rounded-xl flex items-center justify-between text-blue-800 text-xs font-bold shadow-sm sticky top-0 z-10 backdrop-blur-md">
                         <span><i className="fa-solid fa-layer-group mr-2"></i> Mostrando {filteredData.length} inovações mapeadas</span>
                         <span className="opacity-60 font-normal underline cursor-pointer">Explore a galeria</span>
                       </div>
                       {filteredData.map((item) => (
                         <div key={item.id} 
                              className={`bg-white border-2 rounded-2xl p-3 shadow-sm flex items-center gap-4 transition-all duration-300 cursor-pointer
                                         ${hoveredDot?.id === item.id ? 'border-blue-400 bg-slate-50 shadow-md scale-[1.01]' : 'border-slate-100 hover:border-slate-300'}`}
                              onMouseEnter={() => setHoveredDot(item)}
                              onMouseLeave={() => setHoveredDot(null)}
                              onClick={() => setSelectedCard(item)}
                         >
                            <div className="w-16 h-16 rounded-xl overflow-hidden shrink-0 relative shadow-sm border border-slate-200">
                              <img src={String(item.image)} className="w-full h-full object-cover" />
                              <div className="absolute inset-0 bg-slate-900/20"></div>
                              <div className="absolute inset-0 flex items-center justify-center text-white text-[10px] font-black">TRL {String(item.trl)}</div>
                            </div>
                            <div className="flex flex-col flex-1 overflow-hidden">
                               <span className="text-[8px] font-black uppercase tracking-widest truncate mb-0.5" style={{ color: axisColors[item.axis] }}>{String(item.axis)}</span>
                               <h4 className="font-black text-slate-900 text-sm leading-tight truncate mb-1">{String(item.title)}</h4>
                               <div className="flex items-center gap-1.5 text-[9px] font-bold text-slate-500 truncate">
                                  <span>{String(item.country)}</span> <span className="opacity-50">•</span> <span className="truncate">{String(item.institution)}</span>
                               </div>
                            </div>
                            <i className="fa-solid fa-chevron-right text-slate-300 shrink-0"></i>
                         </div>
                       ))}
                       {filteredData.length === 0 && (
                         <div className="p-12 text-center text-slate-500 font-medium bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200 flex flex-col items-center justify-center">
