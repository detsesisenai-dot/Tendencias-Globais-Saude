              </div>
              <p className="text-base lg:text-lg text-gray-600 mb-8 border-l-4 border-gray-300 pl-5 shrink-0 font-medium leading-relaxed bg-gray-50 p-4 rounded-r-xl">
                O GII 2025 decreta: os líderes em saúde detêm uma combinação raríssima: ciência rigorosa, indústria pujante, governo inteligente e patentes protegidas. O Brasil possui o SUS, mercado enorme e excelência intelectual (USP, Fiocruz), mas trava na translação técnica para o mercado industrial.
              </p>

              <div className="flex flex-col md:flex-row gap-6 lg:gap-10 flex-1">
                <div className="flex-1 flex flex-col gap-4 lg:gap-6">
                  <div className="text-gray-700 font-black uppercase text-[10px] lg:text-xs bg-gray-100 px-5 py-2.5 w-max rounded-xl flex items-center gap-2 border border-gray-300 shadow-sm tracking-widest"><i className="fas fa-brain text-blue-600 text-sm"></i> A Visão Pós-GII</div>
                  
                  <div className="p-6 lg:p-8 bg-gray-900 text-white rounded-3xl shadow-2xl border-l-4 border-blue-500 relative overflow-hidden group">
                    <h4 className="font-black text-xl lg:text-2xl mb-3 text-blue-400 relative z-10 tracking-tight">O Que Sinaliza para Goiás?</h4>
                    <p className="text-gray-300 text-sm lg:text-base mb-4 relative z-10 font-medium leading-relaxed">A inteligência reside em não tentar "copiar São Paulo ou Boston" de uma só vez, mas fundir de forma definitiva as capacidades existentes: UFG + CETI-Saúde + FAPEG + SES-GO + DAIA + Hospitais + Startups.</p>
                    <SourceBadge source="Síntese Executiva GII 2025" dark={true} />
                    <i className="fas fa-project-diagram absolute -bottom-5 -right-5 text-[100px] text-gray-700 opacity-20 group-hover:scale-110 transition-transform duration-500"></i>
                  </div>
                  
                  <div className="p-6 lg:p-8 bg-white border border-gray-200 rounded-3xl shadow-lg flex-1 group relative overflow-hidden flex flex-col justify-center">
                    <h4 className="font-black text-xl lg:text-2xl mb-3 text-gray-900 relative z-10 tracking-tight">O Papel do Sistema S (SENAI)</h4>
                    <p className="text-gray-600 text-sm lg:text-base font-medium leading-relaxed relative z-10 flex-1">A oportunidade ímpar repousa na engenharia clínica. Liderar a qualificação técnica de metrologia, calibração robótica, automação hospitalar 4.0, boas práticas limpas de biomanufatura e qualificação da força farmacêutica bruta.</p>
                  </div>
                </div>

                <div className="flex-1 bg-gradient-to-br from-blue-600 to-blue-900 rounded-3xl p-6 lg:p-10 border border-blue-800 flex flex-col relative overflow-hidden shadow-2xl text-white">
                   <div className="text-blue-100 font-black uppercase text-[10px] lg:text-xs bg-blue-900/50 px-5 py-2.5 w-max rounded-xl flex items-center gap-2 mb-6 lg:mb-8 relative z-10 shadow-sm border border-blue-700 tracking-widest"><i className="fas fa-quote-left text-blue-300 text-sm"></i> O Posicionamento Estratégico</div>
                  
                  <div className="flex-1 flex flex-col justify-center items-center text-center relative z-10 px-4">
                    <i className="fas fa-quote-right text-4xl text-blue-400 mb-6 opacity-50"></i>
                    <h2 className="text-2xl lg:text-4xl font-black leading-tight tracking-tight mb-6">
                      "Goiás deve consolidar-se inquestionavelmente como o maior território contínuo de <span className="text-amber-400">validação técnica, industrialização e escala aplicada</span> de soluções em saúde para o SUS e para a base farmacêutica de todo o Centro-Oeste."
                    </h2>
                    <p className="text-blue-200 text-sm lg:text-base font-medium">O encontro letal e perfeito entre a academia que cria, o laboratório de avaliação que atesta, e o polo industrial que manufatura a saúde da população.</p>
                  </div>
                  
                  <i className="fas fa-map-marked-alt absolute -bottom-16 -right-16 text-blue-400 opacity-[0.05] text-[350px] z-0 pointer-events-none"></i>
                </div>
              </div>
            </SlideContainer>
          )
        }
      ];

      const nextSlide = () => setCurrentSlide((prev) => (prev === slides.length - 1 ? 0 : prev + 1));
      const prevSlide = () => setCurrentSlide((prev) => (prev === 0 ? slides.length - 1 : prev - 1));

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'ArrowRight') nextSlide();
          if (e.key === 'ArrowLeft') prevSlide();
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, []);

      return (
        <div className="relative w-full max-w-[1500px] h-[95vh] min-h-[650px] bg-white shadow-2xl rounded-2xl sm:rounded-3xl flex flex-col overflow-hidden border border-gray-300">
          
          {/* HEADER FIXO SUPERIOR */}
          <div className={`px-5 lg:px-10 py-4 lg:py-6 border-b border-gray-100 flex justify-between items-center bg-white z-20 shadow-sm shrink-0 transition-all duration-300 ${slides[currentSlide].headerTitle ? 'h-auto opacity-100' : 'h-0 opacity-0 overflow-hidden py-0 border-transparent'}`}>
             {slides[currentSlide].headerTitle && (
               <>
                 <div className="flex items-center gap-4 lg:gap-5">
                    <div className="p-2.5 lg:p-3 bg-gradient-to-br from-blue-50 to-blue-100 border border-blue-200 rounded-xl shadow-inner flex items-center justify-center">
                      <i className={`${slides[currentSlide].headerIcon} text-blue-700 text-xl lg:text-3xl`}></i>
                    </div>
                    <h2 className="text-xl sm:text-2xl lg:text-4xl font-black text-gray-900 tracking-tighter uppercase truncate leading-none mt-1">{slides[currentSlide].headerTitle}</h2>
                 </div>
                 <div className="text-[10px] lg:text-xs font-black text-gray-500 bg-gray-50 px-4 py-2 rounded-full uppercase tracking-widest hidden sm:flex items-center gap-2 shrink-0 border border-gray-200 shadow-inner">
                    <i className="fas fa-folder-open text-blue-400"></i> Painel de Análise {currentSlide + 1} de {slides.length}
                 </div>
               </>
             )}
          </div>

          {/* ÁREA DE SLIDER CENTRAL */}
          <div className="flex-1 relative bg-white overflow-hidden">
            <div className="absolute top-0 left-0 w-full h-full flex transition-transform duration-[700ms] ease-[cubic-bezier(0.87,0,0.13,1)]" style={{ transform: `translateX(-${currentSlide * 100}%)` }}>
              {slides.map((slide) => (
                <div key={slide.id} className="min-w-full h-full bg-white">
                  {slide.render()}
                </div>
              ))}
            </div>
          </div>

          {/* RODAPÉ E NAVEGAÇÃO */}
          <div className="bg-gray-50 border-t border-gray-200 p-4 lg:p-6 flex justify-between items-center px-5 lg:px-10 z-20 shrink-0">
            <div className="flex items-center gap-5 lg:gap-8">
              <div className="bg-amber-100 p-2 rounded-lg border border-amber-200 shadow-inner hidden sm:block"><i className="fas fa-bolt text-amber-500 text-xl drop-shadow-sm"></i></div>
              <div className="flex gap-2 lg:gap-2.5">
                {slides.map((_, i) => (
                  <button 
                    key={i} onClick={() => setCurrentSlide(i)} aria-label={`Ir para Painel ${i + 1}`}
                    className={`h-2 lg:h-2.5 transition-all duration-300 rounded-full ${currentSlide === i ? 'w-8 lg:w-12 bg-blue-600 shadow-md' : 'w-2 lg:w-2.5 bg-gray-300 hover:bg-gray-400'}`}
                  ></button>
                ))}
              </div>
            </div>
            
            <div className="flex gap-3 lg:gap-4">
              <button onClick={prevSlide} className="px-4 lg:px-6 py-2.5 lg:py-3 flex items-center gap-2 rounded-xl font-bold text-xs lg:text-sm bg-white border-2 border-gray-200 text-gray-700 hover:bg-gray-50 hover:border-gray-300 transition-all shadow-sm focus:ring-4 focus:ring-gray-100">
                <i className="fas fa-arrow-left"></i> <span className="hidden sm:inline uppercase tracking-widest text-[10px] lg:text-xs">Anterior</span>
              </button>
              <button onClick={nextSlide} className="px-4 lg:px-6 py-2.5 lg:py-3 flex items-center gap-2 rounded-xl font-black text-xs lg:text-sm bg-black border-2 border-black text-white hover:bg-gray-800 transition-all shadow-xl hover:shadow-black/20 focus:ring-4 focus:ring-gray-300">
                <span className="hidden sm:inline uppercase tracking-widest text-[10px] lg:text-xs">Avançar Estudo</span> <i className="fas fa-arrow-right"></i>
              </button>
            </div>
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
