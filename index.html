                      <div className="grid md:grid-cols-3 gap-4 mb-6">
                        <ExecutiveSummaryCard title="1. Fronteira Científica" desc="EUA e China lideram a fronteira global com os melhores hospitais, expansão Biotech e IA." icon="🚀" colorClass="border-red-600" />
                        <ExecutiveSummaryCard title="2. Ecossistemas Equilibrados" desc="Suíça, Alemanha e Reino Unido combinam excelência universitária e sistemas fortes." icon="⚖️" colorClass="border-indigo-500" />
                        <ExecutiveSummaryCard title="3. Eficiência & Nichos" desc="Suécia, Holanda, Singapura e Japão dominam IA Médica, longevidade e cuidado integrado." icon="🏥" colorClass="border-emerald-500" />
                      </div>

                      <div className="mb-6 flex flex-col md:flex-row items-center justify-between bg-slate-50 p-4 rounded-2xl border-2 border-slate-100 shadow-sm gap-4">
                        <div className="flex items-center gap-3 px-2"><i className="fa-solid fa-list-ol text-2xl text-blue-600"></i><label className="font-black text-slate-800 text-sm uppercase tracking-tighter">Posição no Ranking:</label></div>
                        <div className="relative w-full md:w-[400px]">
                          <select value={activeCountryId} onChange={(e) => setActiveCountryId(e.target.value)} className="appearance-none w-full bg-white border-2 border-slate-200 text-slate-900 font-black text-base rounded-xl py-3 px-6 cursor-pointer outline-none focus:border-blue-600 shadow-md">
                            {allMapCards.map((card) => (<option key={card.id} value={card.id}>{card.rank}º - {card.country}</option>))}
                          </select>
                          <i className="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-xl text-slate-400 pointer-events-none"></i>
                        </div>
                      </div>

                      <InteractiveMap selectedId={activeCountryId} onSelect={setActiveCountryId} />

                      <div className="mt-8">
                        {allMapCards.filter(item => item.id === activeCountryId).map((selectedData) => (
                          <div key={selectedData.id} className="flex flex-col lg:flex-row bg-white border-2 border-slate-100 rounded-[32px] overflow-hidden shadow-xl group">
                            <div className="bg-slate-900 text-white w-full lg:w-48 p-8 flex flex-col justify-center items-center shrink-0">
                              <span className="text-7xl font-black leading-none drop-shadow-lg">{selectedData.rank}</span>
                              <span className="text-xs font-black uppercase tracking-[0.2em] text-blue-400 mt-4">{selectedData.country.split(' ')[0]}</span>
                            </div>
                            <div className="w-full lg:w-[350px] shrink-0 relative bg-slate-200 border-r-2 border-slate-50">
                              <img src={selectedData.image} alt={selectedData.imageAlt} className="w-full h-full object-cover group-hover:scale-105 transition-all duration-1000" />
                              <div className="absolute bottom-4 left-4 right-4 bg-blue-600/95 backdrop-blur text-white text-[10px] font-black p-3 rounded-xl shadow-lg uppercase tracking-widest text-center">
                                VANTAGEM: {selectedData.specialty}
                              </div>
                            </div>
                            <div className="p-8 flex-1 flex flex-col justify-center">
                              <div className="flex items-center gap-3 border-b-2 border-slate-100 pb-3 mb-4">
                                <i className="fa-solid fa-ranking-star text-3xl text-yellow-500"></i> 
                                <h4 className="text-2xl font-black text-slate-900 uppercase tracking-tighter leading-none">{selectedData.country}</h4>
                              </div>
                              <strong className="block text-sm text-blue-600 mb-2 uppercase tracking-tighter font-black">{selectedData.axis}</strong>
                              <p className="text-slate-700 text-sm leading-relaxed mb-6 font-medium">{selectedData.detail}</p>
                              
                              <div className="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-xl mb-6 shadow-sm">
                                <p className="text-xs text-slate-800 leading-relaxed font-bold italic">"{selectedData.note}"</p>
                              </div>

                              <div className="flex flex-wrap gap-2 mt-auto">
                                {selectedData.stats.map((stat, i) => (
                                  <div key={i} className="bg-slate-50 border border-slate-200 rounded-md px-3 py-1.5 text-[10px] font-black text-slate-800 uppercase tracking-tighter shadow-sm">{stat}</div>
                                ))}
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* SLIDE 3: Brasil */}
                    <div className={`w-full shrink-0 px-2 transition-opacity duration-500 ${activeIndex === 2 ? 'opacity-100' : 'opacity-0 h-0 overflow-hidden'}`}>
                      <SectionHeader title="Recorte Brasil" subtitle="Desafios e Potenciais no Cenário Global." icon="fa-solid fa-map-location-dot" />

                      <DidacticIntro text="O Brasil possui ativos raros: cobertura universal via SUS, bases genômicas diversas e institutos históricos. O desafio atual é a capacidade de investimento per capita para reverter a ciência básica em soluções escaláveis de mercado." />

                      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
                        <StatBadge value="43" label="Score Composto" />
                        <StatBadge value="US$ 2k" label="Gasto Saúde (PPP)" />
                        <StatBadge value="52º" label="GII 2025 (Inovação)" />
                        <StatBadge value="SUS" label="Maior Escala Universal" />
                      </div>

                      <div className="grid lg:grid-cols-2 gap-8">
                        <div className="space-y-4">
                          <h3 className="text-xl font-black mb-3 text-slate-900 border-b-2 pb-2 flex items-center gap-2"><i className="fa-solid fa-building text-2xl text-blue-600"></i> Bases Acadêmicas e Indústria</h3>
                          <div className="grid grid-cols-1 gap-3">
                            {brazilInstitutions.map((inst, i) => (
                              <div key={i} className="flex flex-col sm:flex-row gap-4 p-4 border-2 border-slate-50 rounded-2xl bg-white shadow-md group hover:border-emerald-500 transition-all">
                                <div className="w-full sm:w-24 h-24 shrink-0 rounded-xl overflow-hidden shadow-sm border-2 border-white">
                                  <img src={inst.image} alt={inst.imageAlt} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                                </div>
                                <div className="flex-1 flex flex-col justify-center">
                                  <h4 className="font-black text-sm text-slate-900 mb-1 uppercase tracking-tight leading-none">{inst.name}</h4>
                                  <p className="text-slate-600 text-[11px] leading-tight mb-2 font-medium">{inst.desc}</p>
                                  <div className="bg-blue-50/70 border-l-[3px] border-blue-400 p-2 rounded-r-lg mt-auto">
                                    <p className="text-[10px] text-slate-700 leading-tight italic"><strong className="text-blue-800 uppercase tracking-widest text-[9px] mr-1.5"><i className="fa-solid fa-lightbulb text-yellow-500 mr-1"></i>Nota Explicativa:</strong>{inst.note}</p>
                                  </div>
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                        
                        <div className="bg-slate-900 text-white p-8 rounded-3xl border-t-8 border-emerald-500 shadow-xl flex flex-col justify-center">
                          <h3 className="text-xl font-black mb-6 flex items-center gap-3 border-b border-slate-700 pb-3 uppercase tracking-tighter"><i className="fa-solid fa-rocket text-2xl text-emerald-400"></i> Frentes de Inovação SENAI/SUS</h3>
                          <ul className="space-y-6">
                            <li className="flex gap-4 items-start">
                              <div className="w-12 h-12 bg-blue-600/30 rounded-xl flex items-center justify-center shrink-0 border border-blue-500/50 text-2xl shadow-sm">💻</div>
                              <div>
                                <strong className="block text-sm text-blue-300 font-black mb-1 uppercase tracking-tight">Saúde Digital & Interoperabilidade</strong>
                                <p className="text-slate-300 text-xs leading-relaxed font-light">Evolução da RNDS (Rede Nacional de Dados em Saúde), adoção de padrões HL7/FHIR (Padrões Internacionais de Interoperabilidade), segurança de dados em saúde e integração de sistemas hospitalares.</p>
                              </div>
                            </li>
                            <li className="flex gap-4 items-start">
                              <div className="w-12 h-12 bg-emerald-600/30 rounded-xl flex items-center justify-center shrink-0 border border-emerald-500/50 text-2xl shadow-sm">💊</div>
                              <div>
                                <strong className="block text-sm text-emerald-300 font-black mb-1 uppercase tracking-tight">Biofabricação & Complexo Industrial</strong>
                                <p className="text-slate-300 text-xs leading-relaxed font-light">Fortalecimento do CEIS (Complexo Econômico-Industrial da Saúde), desenvolvimento de biofármacos nacionais, vacinas e redução da dependência tecnológica externa.</p>
                              </div>
                            </li>
                          </ul>
                        </div>
                      </div>
                    </div>

                    {/* SLIDE 4: Goiás */}
                    <div className={`w-full shrink-0 px-2 transition-opacity duration-500 ${activeIndex === 3 ? 'opacity-100' : 'opacity-0 h-0 overflow-hidden'}`}>
                      <SectionHeader title="Recorte Goiás" subtitle="Ciência translacional do Cerrado." icon="fa-solid fa-map-pin" />

                      <DidacticIntro text="Goiás desponta estrategicamente na ciência utilizando a robustez de suas universidades, como a UFG (Universidade Federal de Goiás), para exportar tecnologias médicas. Foco em doenças regionais e soluções tecnológicas para o SUS (Sistema Único de Saúde)." />

                      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                        <StatBadge value="R$ 21M" label="Invest. Ceti-Saúde" />
                        <StatBadge value="6.000+" label="Pacientes Chagas" />
                        <StatBadge value="R$ 10M" label="Inv. HC-UFG 2024" />
                        <StatBadge value="30+" label="Fábricas em Anápolis" />
                      </div>

                      <div className="grid lg:grid-cols-2 gap-8">
                        <div className="flex flex-col gap-6">
                          <div className="bg-slate-900 p-6 rounded-3xl text-white shadow-lg relative overflow-hidden group border-b-4 border-indigo-600">
                            <img src="https://images.unsplash.com/photo-1581093458791-9f3c3900df4b?auto=format&fit=crop&w=800&q=80" className="absolute inset-0 w-full h-full object-cover opacity-20 mix-blend-overlay group-hover:scale-105 transition-transform duration-1000" alt="" />
                            <div className="relative z-10 flex flex-col gap-3">
                              <i className="fa-solid fa-award text-4xl text-yellow-400 drop-shadow-md"></i>
                              <div>
                                <h3 className="text-xl font-black mb-1 uppercase tracking-tighter">Ceti-Saúde (2025)</h3>
                                <p className="text-blue-100 text-xs leading-relaxed mb-2 font-light">Maior investimento histórico em P&D (Pesquisa e Desenvolvimento) focado na rede pública, viabilizado pela Fapeg (Fundação de Amparo à Pesquisa do Estado de Goiás) e UFG.</p>
                              </div>
                            </div>
                          </div>
                          <div className="grid grid-cols-2 gap-3">
                            {goiasInstitutions.map((inst, i) => (
                              <div key={i} className="p-4 border-2 border-slate-50 bg-white rounded-2xl shadow-sm hover:border-blue-400 transition-colors flex flex-col">
                                <div className="w-full h-20 mb-2 rounded-lg overflow-hidden bg-slate-100 shrink-0">
                                    <img src={inst.image} className="w-full h-full object-cover" alt="" />
                                </div>
                                <strong className="block text-[11px] text-slate-900 mb-1 font-black uppercase tracking-tight leading-tight">{inst.name}</strong>
                                <span className="text-[10px] text-slate-600 leading-tight font-medium mb-3 flex-1">{inst.desc}</span>
                                <div className="bg-indigo-50/70 border-l-[3px] border-indigo-400 p-2 rounded-r-lg mt-auto">
                                    <p className="text-[9px] text-slate-700 leading-tight italic"><strong className="text-indigo-800 uppercase tracking-widest text-[8px] mr-1.5"><i className="fa-solid fa-lightbulb text-yellow-500 mr-1"></i>Nota:</strong>{inst.note}</p>
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>

                        <div className="space-y-4">
                          <h3 className="text-xl font-black mb-3 text-slate-900 border-b-2 pb-2 uppercase tracking-tighter">Pesquisas de Impacto Regional</h3>
                          <div className="grid grid-cols-1 gap-3">
                            {goiasResearches.map((item, i) => (
                              <div key={i} className="flex flex-col sm:flex-row gap-4 p-4 border-2 border-slate-50 rounded-2xl bg-white shadow-md group items-center">
                                <div className="w-full sm:w-24 h-24 shrink-0 rounded-xl overflow-hidden shadow-sm">
                                  <img src={item.image} alt={item.imageAlt} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                                </div>
                                <div className="flex-1 w-full flex flex-col justify-center">
                                  <strong className="text-sm font-black text-slate-900 mb-1 uppercase tracking-tighter leading-none block">{item.title}</strong>
                                  <p className="text-slate-600 text-[11px] font-medium leading-snug mb-2">{item.desc}</p>
                                  <div className="bg-emerald-50/70 border-l-[3px] border-emerald-400 p-2 rounded-r-lg mt-auto">
                                    <p className="text-[10px] text-slate-700 leading-tight italic"><strong className="text-emerald-800 uppercase tracking-widest text-[9px] mr-1.5"><i className="fa-solid fa-lightbulb text-yellow-500 mr-1"></i>Nota Explicativa:</strong>{item.note}</p>
                                  </div>
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    </div>

                    {/* SLIDE 5: Radar de Inovação */}
                    <div className={`w-full shrink-0 px-2 transition-opacity duration-500 ${activeIndex === 4 ? 'opacity-100' : 'opacity-0 h-0 overflow-hidden'}`}>
                      <SectionHeader title="Radar de Inovação" subtitle="Deep-Tech Global" icon="fa-solid fa-bullseye" />
                      <DidacticIntro text="Catalogação de tecnologias disruptivas validadas por ciência de alto impacto que estão redefinindo protocolos clínicos, diagnósticos e engenharias biomédicas em tempo real." />

                      <div className="grid grid-cols-1 gap-8 overflow-y-auto no-scrollbar pb-24" style={{ maxHeight: 'calc(100vh - 350px)' }}>
                        {featuredInnovations.map((innovation) => (
                          <div key={innovation.id} className="bg-white border-2 border-slate-100 rounded-3xl overflow-hidden shadow-xl flex flex-col md:flex-row group min-h-[350px]">
                            <div className="md:w-[350px] relative bg-slate-900 overflow-hidden shrink-0">
                              <img src={innovation.image} alt={innovation.imageAlt} className="w-full h-full object-cover opacity-70 group-hover:scale-105 transition-transform duration-[2000ms]" />
                              <div className="absolute top-6 left-6 bg-white text-slate-900 text-[10px] font-black px-3 py-1.5 rounded-full shadow-lg uppercase tracking-widest border border-slate-100">
                                {innovation.country}
                              </div>
                              <div className="absolute bottom-6 left-6 right-6 bg-blue-600/90 backdrop-blur-md text-white text-[11px] font-black px-5 py-4 rounded-2xl shadow-xl border border-white/20">
                                <div className="flex items-center gap-2 mb-1 uppercase opacity-80 tracking-widest text-[9px]"><i className="fa-solid fa-building"></i> INSTITUIÇÃO</div>
                                <span className="text-sm tracking-tight">{innovation.institution}</span>
                              </div>
                            </div>
                            
                            <div className="p-8 md:w-3/5 flex flex-col">
                              <div className="flex items-center gap-4 mb-4">
                                <span className="text-5xl drop-shadow-md text-slate-800"><i className={innovation.icon}></i></span>
                                <div>
                                  <h3 className="text-2xl font-black text-slate-900 uppercase tracking-tighter leading-none mb-1">{innovation.title}</h3>
                                  <strong className="block text-sm text-blue-600 uppercase tracking-widest font-black italic">{innovation.subtitle}</strong>
                                </div>
                              </div>
                              
                              <div className="grid grid-cols-1 md:grid-cols-2 gap-8 my-6 flex-1">
                                <div>
                                  <h5 className="flex items-center gap-2 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3">
                                    <i className="fa-solid fa-microscope text-sm"></i> Mecanismo
                                  </h5>
                                  <p className="text-sm text-slate-700 leading-relaxed font-medium">
                                    {innovation.solution}
                                  </p>
                                </div>
                                <div className="bg-slate-50 p-6 rounded-2xl shadow-inner border border-slate-100 flex flex-col justify-center relative">
                                  <h5 className="flex items-center gap-2 text-[10px] font-black text-blue-600 uppercase tracking-[0.2em] mb-3">
                                    <i className="fa-solid fa-stethoscope text-sm"></i> Impacto Clínico
                                  </h5>
                                  <p className="text-sm text-slate-800 leading-relaxed font-bold italic mb-6">
                                    "{innovation.details}"
                                  </p>
                                  <div className="bg-blue-100/60 border-l-[4px] border-blue-500 p-3 rounded-r-xl mt-auto">
                                    <p className="text-[11px] text-slate-700 leading-snug font-medium italic">
                                      <strong className="text-blue-900 uppercase tracking-widest text-[9px] mr-2"><i className="fa-solid fa-lightbulb text-yellow-500 mr-1"></i>Nota Estratégica:</strong>
                                      {innovation.note}
                                    </p>
                                  </div>
                                </div>
                              </div>
                              <div className="mt-auto">
                                <SourceTag source={innovation.source} />
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>

                  </div>
                </div>
              </main>

              <footer className="bg-slate-900 text-slate-400 py-6 px-12 border-t-4 border-blue-600 shrink-0 mt-auto">
                <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                  <div className="text-center md:text-left">
                    <h5 className="font-black text-white text-sm uppercase tracking-tighter mb-1">Painel Estratégico de Inovação em Saúde</h5>
                    <p className="text-[11px] font-medium opacity-60">Dados: WIHI 2024 da FREOPP (Fundação para Pesquisa sobre Oportunidades Iguais), GII 2025 da WIPO (Org. Mundial da Propriedade Intelectual), OCDE (Org. para Cooperação e Desenv. Econômico), OMS, Banco Mundial.</p>
                  </div>
                  <div className="flex flex-col items-center md:items-end">
                    <div className="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1">Atualização</div>
                    <div className="text-xl font-black text-blue-400 uppercase tracking-tighter leading-none">MAIO / 2026</div>
                  </div>
                </div>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
