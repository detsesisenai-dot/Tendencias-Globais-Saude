                                <div className="text-xs font-black text-indigo-200 uppercase bg-black/40 w-fit px-4 py-2 rounded-full border border-indigo-400/30 shadow-lg">Órgão Fomentador: Fapeg</div>
                              </div>
                            </div>
                          </div>
                          <div className="grid grid-cols-2 gap-4">
                            {goiasInstitutions.map((inst, i) => (
                              <div key={i} className="p-4 border-4 border-slate-50 bg-white rounded-3xl shadow-lg hover:border-blue-400 transition-colors flex flex-col justify-center">
                                <strong className="block text-base text-slate-900 mb-1 font-black uppercase tracking-tight">{inst.name}</strong>
                                <span className="text-sm text-slate-600 leading-tight font-medium">{inst.desc}</span>
                              </div>
                            ))}
                          </div>
                        </div>

                        <div className="space-y-6">
                          <h3 className="text-2xl font-black mb-4 text-slate-900 border-b-2 pb-2 uppercase tracking-tighter">Pesquisas de Impacto na Ponta</h3>
                          <div className="grid grid-cols-1 gap-4">
                            {goiasResearches.map((item, i) => (
                              <div key={i} className="flex gap-6 p-4 border-4 border-slate-50 rounded-[40px] bg-white shadow-xl hover:shadow-2xl transition-all group items-center">
                                <div className="w-24 h-24 shrink-0 rounded-2xl overflow-hidden bg-slate-100 border-2 border-white shadow-md">
                                  <img src={item.image} alt={item.imageAlt} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                                </div>
                                <div className="flex-1">
                                  <strong className="text-slate-900 block text-xl font-black mb-1 uppercase tracking-tight leading-none">{item.title}</strong>
                                  <p className="text-slate-600 text-base leading-snug font-medium">{item.desc}</p>
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    </div>

                    {/* SLIDE 5: Radar de Inovação */}
                    <div className={`w-full shrink-0 px-4 transition-opacity duration-700 ${activeIndex === 4 ? 'opacity-100' : 'opacity-0 h-0 overflow-hidden'}`}>
                      <SectionHeader title="Radar de Inovação" subtitle="Soluções deep-tech validadas por ciência de alto impacto." icon="fa-solid fa-bullseye" />
                      <DidacticIntro text="Nesta aba apresentamos inovações disruptivas validadas clinicamente que estão mudando os protocolos de tratamento hospitalar em tempo real." />

                      <div className="grid grid-cols-1 gap-12 overflow-y-auto no-scrollbar pb-32" style={{ maxHeight: 'calc(100vh - 400px)' }}>
                        {featuredInnovations.map((innovation) => (
                          <div key={innovation.id} className="bg-white border-4 border-slate-50 rounded-[50px] overflow-hidden shadow-[0_50px_100px_rgba(0,0,0,0.1)] flex flex-col md:flex-row group min-h-[450px]">
                            <div className="md:w-[450px] relative bg-slate-900 overflow-hidden shrink-0">
                              <img src={innovation.image} alt={innovation.imageAlt} className="w-full h-full object-cover opacity-80 group-hover:scale-105 transition-transform duration-[2000ms]" />
                              <div className="absolute top-10 left-10 bg-white text-slate-900 text-sm font-black px-6 py-2 rounded-full shadow-2xl uppercase tracking-widest border-2 border-slate-100">
                                {innovation.country}
                              </div>
                              <div className="absolute bottom-10 left-10 right-10 bg-blue-600/90 backdrop-blur-2xl text-white text-sm font-black px-8 py-6 rounded-[32px] shadow-2xl border-2 border-white/20">
                                <div className="flex items-center gap-3 mb-2 uppercase opacity-80 tracking-widest text-[11px]"><i className="fa-solid fa-building text-lg"></i> INSTITUIÇÃO</div>
                                <span className="text-lg tracking-tight">{innovation.institution}</span>
                              </div>
                            </div>
                            
                            <div className="p-16 md:w-3/5 flex flex-col">
                              <div className="flex items-center gap-6 mb-6">
                                <span className="text-8xl drop-shadow-2xl">{innovation.icon}</span>
                                <div>
                                  <h3 className="text-4xl font-black text-slate-900 uppercase tracking-tighter leading-[0.9] mb-3">{innovation.title}</h3>
                                  <strong className="block text-xl text-blue-600 uppercase tracking-widest font-black italic">{innovation.subtitle}</strong>
                                </div>
                              </div>
                              
                              <div className="grid grid-cols-1 md:grid-cols-2 gap-12 my-10 flex-1">
                                <div>
                                  <h5 className="flex items-center gap-3 text-sm font-black text-slate-400 uppercase tracking-[0.2em] mb-6">
                                    <i className="fa-solid fa-heart-pulse text-2xl"></i> Descrição da Solução
                                  </h5>
                                  <p className="text-xl text-slate-700 leading-relaxed font-medium">
                                    {innovation.solution}
                                  </p>
                                </div>
                                <div className="bg-blue-50 p-10 rounded-[40px] shadow-inner border-2 border-blue-100">
                                  <h5 className="flex items-center gap-3 text-sm font-black text-blue-600 uppercase tracking-[0.2em] mb-6">
                                    <i className="fa-solid fa-stethoscope text-2xl"></i> Impacto Clínico
                                  </h5>
                                  <p className="text-xl text-slate-800 leading-relaxed font-bold italic">
                                    "{innovation.details}"
                                  </p>
                                </div>
                              </div>
                              <div className="mt-auto">
                                <SourceTag source={innovation.source} />
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>

                  </div>
                </div>
              </main>

              <footer className="bg-slate-900 text-slate-400 py-10 px-20 border-t-8 border-blue-600 shrink-0 mt-auto shadow-[0_-20px_50px_rgba(0,0,0,0.3)]">
                <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
                  <div className="text-center md:text-left">
                    <h5 className="font-black text-white text-xl uppercase tracking-tighter mb-2">Painel de Inteligência Competitiva em Saúde</h5>
                    <p className="text-base font-medium opacity-60 max-w-3xl">Dados consolidados do GII 2025, WIPO, FREOPP, IQVIA, Deloitte e redes de publicações científicas de alto impacto.</p>
                  </div>
                  <div className="flex flex-col items-center md:items-end">
                    <div className="text-[12px] font-black text-slate-500 uppercase tracking-[0.3em] mb-2">Monitoramento Ativo</div>
                    <div className="text-3xl font-black text-blue-400 uppercase tracking-tighter leading-none">MAIO / 2026</div>
                  </div>
                </div>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
